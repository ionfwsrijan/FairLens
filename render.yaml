services:
  - type: web
    name: fairlens-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: FAIRLENS_ROOT
        value: .
      - key: FRONTEND_ORIGINS
        value: http://localhost:3000
      - key: FIREBASE_DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
